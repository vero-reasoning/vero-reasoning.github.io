<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spatial & Actions Demos</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --line: #d6e1ee;
            --text: #0D2137;
            --muted: #697084;
            --brand: #1976D2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 36px 20px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            max-width: 780px;

            margin: 0 auto;
        }

        /* ── Card ─────────────────────────────────────── */
        .chat-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
        }

        /* ── Header ──────────────────────────────────── */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--line);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
        }

        .demo-tag {
            color: var(--brand);
            font-weight: 700;
        }

        .header-sep {
            color: var(--muted);
            font-weight: 400;
        }

        .header-title {
            color: var(--text);
            font-weight: 500;
        }

        .pager {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-btn {
            border: none;
            background: none;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 6px;
            line-height: 1;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--line);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .step {
            color: var(--muted);
            font-size: 14px;
            min-width: 38px;
            text-align: center;
        }

        /* ── Chat body ───────────────────────────────── */
        .chat-body {
            padding: 20px 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f9fafb;
        }

        /* ── User turn (right bubble) ────────────────── */
        .user-turn {
            align-self: flex-end;
            max-width: 75%;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 14px 14px 4px 14px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-question {
            margin: 0;
            font-size: 15px;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
        }

        .problem-image {
            width: 100%;
            max-width: 300px;
            align-self: flex-end;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--line);
            object-fit: cover;
        }

        /* ── Assistant turn (left) ───────────────────── */
        .assistant-turn {
            align-self: flex-start;
            max-width: 92%;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .assistant-avatar {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1976D2;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .assistant-body {
            flex: 1;
            min-width: 0;
        }

        .assistant-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .assistant-content {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 4px 14px 14px 14px;
            padding: 12px 14px;
        }

        .assistant-scroll {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: auto;
            max-height: 560px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            font-family: inherit;
        }
    </style>
</head>

        function normalizeAssistant(raw) {
            const lines = String(raw).replace(/\r\n/g, '\n').split('\n');
            while (lines.length && lines[0].trim() === '') lines.shift();
            while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
            const isTagLine = l => /^\s*&lt;\/?(?:think|answer)&gt;\s*$/i.test(l);
            let minIndent = Infinity;
            for (const l of lines) {
                if (!l.trim() || isTagLine(l)) continue;
                const m = l.match(/^[ \t]*/);
                const n = m ? m[0].length : 0;
                if (n < minIndent) minIndent = n;
            }
            if (!Number.isFinite(minIndent)) minIndent = 0;
            return lines.map(l => {
                if (isTagLine(l)) return l.trim();
                if (!l.trim()) return '';
                return l.slice(Math.min(minIndent, (l.match(/^[ \t]*/) || [''])[0].length)).trimEnd();
            }).join('\n');
        }
