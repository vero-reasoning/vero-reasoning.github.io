<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captioning & Instruction Following Demos</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --line: #d6e1ee;
            --text: #0D2137;
            --muted: #697084;
            --brand: #1976D2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 36px 20px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            max-width: 780px;

            margin: 0 auto;
        }

        /* ── Card ─────────────────────────────────────── */
        .chat-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
        }

        /* ── Header ──────────────────────────────────── */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--line);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
        }

        .demo-tag {
            color: var(--brand);
            font-weight: 700;
        }

        .header-sep {
            color: var(--muted);
            font-weight: 400;
        }

        .header-title {
            color: var(--text);
            font-weight: 500;
        }

        .pager {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-btn {
            border: none;
            background: none;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 6px;
            line-height: 1;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--line);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .step {
            color: var(--muted);
            font-size: 14px;
            min-width: 38px;
            text-align: center;
        }

        /* ── Chat body ───────────────────────────────── */
        .chat-body {
            padding: 20px 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f9fafb;
        }

        /* ── User turn (right bubble) ────────────────── */
        .user-turn {
            align-self: flex-end;
            max-width: 75%;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 14px 14px 4px 14px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-question {
            margin: 0;
            font-size: 15px;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
        }

        .problem-image {
            width: 100%;
            max-width: 300px;
            align-self: flex-end;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--line);
            object-fit: cover;
        }

        /* ── Assistant turn (left) ───────────────────── */
        .assistant-turn {
            align-self: flex-start;
            max-width: 92%;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .assistant-avatar {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1976D2;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .assistant-body {
            flex: 1;
            min-width: 0;
        }

        .assistant-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .assistant-content {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 4px 14px 14px 14px;
            padding: 12px 14px;
        }

        .assistant-scroll {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: auto;
            max-height: 560px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            font-family: inherit;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="chat-card" aria-label="Example conversation">
            <header class="chat-header">
                <div class="header-left">
                    <span class="demo-tag" id="demoLabel">Demo1</span>
                    <span class="header-sep"></span>
                    <span class="header-title"></span>
                </div>
                <div class="pager">
                    <button class="nav-btn" id="prevBtn">&#8249;</button>
                    <span class="step" id="stepLabel">1/3</span>
                    <button class="nav-btn" id="nextBtn">&#8250;</button>
                </div>
            </header>

            <div class="chat-body">
                <article class="user-turn" aria-label="User message">
                    <p class="user-question" id="questionText"></p>
                    <img class="problem-image" id="problemImage" src=""
                        alt="Captioning & Instruction Following problem screenshot" />
                </article>

                <article class="assistant-turn" aria-label="Model response">
                    <div class="assistant-avatar" id="assistantAvatar">V</div>
                    <div class="assistant-body">
                        <div class="assistant-name" id="assistantName">Vero</div>
                        <div class="assistant-content">
                            <div class="assistant-scroll" id="assistantText"></div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script>
        const DEMOS = [{ "demo": "Captioning & Instruction Following 1", "question": "Write a four-line rhyming poem capturing the essence of the scene, where each line highlights a different visual element from the image.", "image": "example_cap1.png", "assistant": "&lt;think&gt;\nHmm, let's see. The question is to write a four-line rhyming poem capturing the essence of the scene, with each line highlighting a different visual element from the image. Okay, first I need to identify key visual elements in the image. There's a skateboarder mid-air doing a trick, another person on a bike, graffiti-covered buildings, maybe some people around, ramps or skate structures.\n\nOkay, so each line must focus on a different element. Let me brainstorm: maybe start with the skateboarder jumping (line 1), then the bike rider (line 2), graffiti walls (line 3), and the setting like the skate park or buildings (line 4). Need rhyming scheme—maybe AABB or ABAB. Four lines, each with a different element and a rhyme.\n\nLine 1: Skateboarder leaping—maybe \"mid-air leap\" or \"skater flies\". Rhyme with next line. Line 2: Bike rider. Maybe \"biker pedals steady\". Rhyme with line 1? Like \"leap\" and \"steady\" don't rhyme. Maybe ABAB. Line 1: leap (A), Line 2: bike (B), Line 3: graffiti (A), Line 4: park (B). Wait, better to stick to AABB for simplicity.\n\nFirst line: skateboarder's jump. \"A skater arcs through air so high.\" Second line: bike rider. Maybe \"A cyclist pedals, steady, by.\" Third line: graffiti walls. \"Graffiti blooms on walls so bold.\" Fourth line: skate park vibe. \"Concrete park where youth unfold.\" Check rhymes: high/by—no. Maybe adjust second line to end with a rhyme for 'high'. Maybe \"A skater arcs through air so high, / A biker waits on bicycle's thigh.\" But thighs aren't ideal. Alternatively, \"A skater leaps with board unfurled, / A cyclist holds his balance curled.\" Hmm, not great. Maybe \"Skateboarder soars, mid-air grace, / Bike rider pedals in that space.\" Then graffiti: \"Graffiti paints the brick wall bright,\" and last line: \"Youth gather here, bathed in day's light.\"\n\nWait, needs rhyming. Let me try:\n\n1. A skater leaps, board spinning free,  \n2. While cyclist pedals down the street.  \n3. Graffiti swirls where colors meet,  \n4. Under sky, a vibrant beat.  \n\nBut check elements: line 1—skater, line 2—bike rider, line 3—graffiti, line 4—the park/scene. Rhyme scheme AABB. Lines 1&2 don't perfectly rhyme. Maybe:\n\nA skater arcs through air so high,  \nA cyclist pedals, steady by.  \nGraffiti bursts on walls nearby,  \nSkate park pulses, wild and free.  \n\n\"High\" and \"by\" don't rhyme well. Let's tweak line 2 to rhyme with \"high\". Maybe:\n\nA skater soars on board above,  \nWhere bike rider moves, steadily love.  \nGraffiti paints the brick wall deep,  \nThe city's heartbeat never sleep.  \n\nBut \"above\" and \"love\" don't rhyme. Maybe:\n\nA skater leaps on board unfurled,  \nBike rider waits, still steady girl.  \nGraffiti flames on wall so grand,  \nConcrete dreams across the land.  \n\nOkay, \"unfurled\" and \"girl\" don't quite. Alternatively, make line 1 end with a word that rhymes with line 4. Let's aim for AABB:\n\n1. A skater vaults, board slicing air,  \n2. A cyclist pedals, strong and there.  \n3. Walls blaze with tags, bold, vivid, bright,  \n4. Youth find their joy in daylight.  \n\n\"Air\" and \"there\" – weak rhyme. Maybe \"air\" rhymes with \"pair\", but maybe accept. Or better:\n\n1. Skateboarder soars, mid-flight, so bold,  \n2. Cyclist waits, story to be told.  \n3. Graffiti swirls in hues alive,  \n4. Skate park thrums, beneath the hive.  \n\nWait, \"bold\" and \"told\"—not perfect. Maybe adjust:\n\n1. A skater arcs, defying ground,  \n2. A cyclist glides, without a sound.  \n3. Walls speak in colors, bold and bright,  \n4. Youth gather here, day’s warm light.  \n\nYes! This works. Each line a different element: skater (line1), cyclist (line2), graffiti (line3), skate park/youth scene (line4). Rhyme scheme AABB: ground/sound, bright/light. Good.\n&lt;/think&gt;\n\n&lt;answer&gt;\nA skater arcs, defying ground,  \nA cyclist glides, without a sound.  \nWalls speak in colors, bold and bright,  \nYouth gather here, day’s warm light. \n&lt;/answer&gt;" }, { "demo": "Captioning & Instructiong Following 2", "question": "A pair of parents is asking whether they should feed their one-year-old child the dish shown in the image. Provide them with advice.", "image": "example_cap3.png", "assistant": "&lt;think&gt;\nHmm, let's see. The question is whether parents should feed their one-year-old the dish in the image. Okay, first I need to look at what the dish is. From the image: there's a plate with stir-fried meat (looks like chicken or pork) with green peppers and maybe some other veggies. There's also a bowl of white rice next to it. Wait, but for a one-year-old—what are the concerns here?\n\nOkay, starting with the main components. The stir-fry has pieces of meat mixed with vegetables. But maybe the meat isn't cooked appropriately for babies? Wait, at one year old, babies can eat solid foods but need to be careful. The meat might be too chunky—maybe it should be finely minced or pureed. Also, there's a spoon on the plate, but maybe the meat chunks could be a choking hazard. Oh right, even though it's chopped, if the pieces aren't small enough, that's a risk.\n\nThen there's the rice. Rice is usually okay once they're older than 6 months, but sometimes parents avoid rice because of arsenic content. But maybe it's safe in moderation. However, the rice here is plain white rice—probably not an issue unless served in large amounts. But maybe the concern is more about the stir-fried dish having added seasonings, sauces, or spices. Wait, the dish looks glossy—maybe soy sauce or another savory sauce. Soy sauce has high sodium and might not be recommended for infants since their kidneys are still developing. Also, maybe the sauce could have garlic or onions which might be allergens or irritants.\n\nAlso, the baby's digestive system at one year is still maturing. Introducing new proteins like chicken/pork might be okay if previously introduced, but maybe better to stick to simple, single-ingredient foods initially. But assuming they've already had meats before—still, the stir-fry might have multiple ingredients that could cause digestive upset or allergies.\n\nAnother point: The rice bowl—maybe rice is okay as a side, but again, ensure it's well-cooked and soft. But the main problem might be the sauce and seasoning. For example, soy sauce adds salt, which can strain kidneys. Maybe the parents should modify the dish: remove the sauce, cook the meat without added salt or spices, and make sure the meat is cut into very small, soft pieces or pureed.\n\nAlso, check if the vegetables are properly prepared—green peppers might be okay if cooked soft. But maybe chop them smaller. The spoon is part of the meal setup, but not relevant to the food safety issue.\n\nPossible advice: Yes, but with modifications. Avoid the sauce (if it contains soy sauce, garlic, etc.), make sure meat is finely chopped or pureed, serve plain rice. Alternatively, suggest consulting a pediatrician or using infant-specific recipes.\n\nWait, the question is whether they should feed it \"as shown\" or not. Since the dish has visible sauce (which might contain salt/sugar/seasonings), and the meat/chunks might be too big—so probably safer to say no without modification. Recommend preparing the dish specifically for the child: remove sauce, cut all ingredients into tiny bits, use unsalted broth instead of soy sauce.\n\nSo, the key points: Choking hazard from chunks, possible excessive sodium/sugars in sauce, allergens (like garlic/onions). Therefore, advise against feeding the dish exactly as shown, but suggest safer alternatives.\n&lt;/think&gt;\n\n&lt;answer&gt;\nThe dish in the image appears to be stir-fried meat (likely chicken or pork) with green bell peppers and possibly garlic or ginger, served alongside white rice. While one-year-old children can begin eating solid foods like cooked meats and vegetables, **this specific dish may not be safe or appropriate without modifications** due to several concerns:  \n\n1. **Choking hazard**: The meat and vegetable pieces look chunky (not finely minced or pureed), which poses a significant choking risk for a toddler whose oral motor skills are still developing.  \n2. **Sauce/seasoning**: The glossy appearance suggests a sauce (possibly soy-based), which likely contains salt, sugar, or spices (e.g., garlic, onion, or chili) that could overload a baby’s immature kidneys or trigger digestive upset. Infant diets should prioritize *unsalted* and *single-ingredient* foods.  \n3. **Rice considerations**: Plain white rice is generally safe in moderation for toddlers but should be served without additives (e.g., salted broth or seasoned rice). However, rice grains remain a mild choking risk if not softened fully.  \n\n**Recommendation**: Modify the dish before serving—for example, cook the meat into fine, soft mince or puree, remove all sauce/spices, slice vegetables into tiny, tender pieces, and serve rice plain (without excess liquid). Always supervise meals and consult a pediatrician before introducing new foods or complex dishes to ensure alignment with your child’s individual needs and dietary guidelines. \n&lt;/answer&gt;" }, { "demo": "Captioning & Instruction Following 3", "question": "Assume this object has a hidden feature that's not visible in the image. Describe this feature and its purpose in a metaphorical sense, and connect it to the urban setting it is in, all in three sentences.", "image": "example_cap2.png", "assistant": "&lt;think&gt;\nHmm, let's tackle this question. The user wants me to describe a hidden feature of the bicycle (not visible in the image) metaphorically, connect it to the urban setting, and keep it to three sentences. Okay, first I need to come up with a hidden feature. Maybe something like a secret compartment or an unseen part that symbolizes something urban.\n\nWait, the feature has to be metaphorical. Maybe the bike has a hidden \"resilience\" or \"quiet strength\" that isn't obvious. But I need to phrase it as a hidden physical feature. Oh, maybe a hidden gear that powers silent movement through city chaos—like an unnoticed adaptation. But how to tie it metaphorically to the urban setting?\n\nOkay, the bike is on a sidewalk near a street with cars and buildings. The hidden feature should metaphorically reflect urban life. Maybe: The bicycle harbors a hidden spring within its frame—a subtle tension waiting to propel it forward when the city’s rush stirs. Like roots gripping stone beneath pavement cracks, this unseen resilience quietly absorbs the concrete’s harshness, turning daily commutes into journeys of quiet endurance. It is the unspoken promise of stillness amidst motion, a silent guardian that turns the sidewalk’s chaos into pathways of calm persistence.\n\nCheck: Three sentences, metaphorical feature (spring/tension), connects to urban setting (concrete, commutes, sidewalk chaos). Made sure not to mention visible parts beyond the metaphor. Okay, that should work.\n&lt;answer&gt;\nThe bicycle holds a hidden pulse within its frame—a silent reservoir of patience, humming just below the surface like a subway line waiting for the next train to awaken the city. This unseen rhythm mirrors the urban landscape’s quiet resilience, absorbing the jarring rhythms of passing cars and hurried footsteps without breaking its own steady cadence. In the concrete embrace of the sidewalk, it becomes a vessel for stillness, transforming the rush of streets into a deliberate, unhurried dance with time.  \n&lt;/answer&gt;" }];
        let index = 0;

        const demoLabel = document.getElementById('demoLabel');
        const stepLabel = document.getElementById('stepLabel');
        const questionText = document.getElementById('questionText');
        const problemImage = document.getElementById('problemImage');
        const assistantText = document.getElementById('assistantText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function normalizeAssistant(raw) {
            const lines = String(raw).replace(/\r\n/g, '\n').split('\n');
            while (lines.length && lines[0].trim() === '') lines.shift();
            while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
            const isTagLine = l => /^\s*&lt;\/?(?:think|answer)&gt;\s*$/i.test(l);
            let minIndent = Infinity;
            for (const l of lines) {
                if (!l.trim() || isTagLine(l)) continue;
                const m = l.match(/^[ \t]*/);
                const n = m ? m[0].length : 0;
                if (n < minIndent) minIndent = n;
            }
            if (!Number.isFinite(minIndent)) minIndent = 0;
            return lines.map(l => {
                if (isTagLine(l)) return l.trim();
                if (!l.trim()) return '';
                return l.slice(Math.min(minIndent, (l.match(/^[ \t]*/) || [''])[0].length)).trimEnd();
            }).join('\n');
        }

        function render() {
            const item = DEMOS[index];
            demoLabel.textContent = item.demo;
            stepLabel.textContent = (index + 1) + '/' + DEMOS.length;
            questionText.textContent = item.question;
            problemImage.src = item.image || '';
            problemImage.style.display = item.image ? 'block' : 'none';
            assistantText.innerHTML = normalizeAssistant(item.assistant)
                .replace(/\*\*(.*?)\*\*/gs, '<strong>$1</strong>')
                .replace(/(?<!\w)\*(?!\s)(.*?)(?<!\s)\*(?!\w)/gs, '<em>$1</em>');
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === DEMOS.length - 1;
        }

        prevBtn.addEventListener('click', () => { if (index > 0) { index--; render(); } });
        nextBtn.addEventListener('click', () => { if (index < DEMOS.length - 1) { index++; render(); } });
        render();
    </script>
</body>

</html>
