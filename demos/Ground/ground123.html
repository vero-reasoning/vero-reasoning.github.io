<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grounding, Counting & Visual Search Demos</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --line: #d6e1ee;
            --text: #0D2137;
            --muted: #697084;
            --brand: #1976D2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 36px 20px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            max-width: 780px;

            margin: 0 auto;
        }

        /* ── Card ─────────────────────────────────────── */
        .chat-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
        }

        /* ── Header ──────────────────────────────────── */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--line);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
        }

        .demo-tag {
            color: var(--brand);
            font-weight: 700;
        }

        .header-sep {
            color: var(--muted);
            font-weight: 400;
        }

        .header-title {
            color: var(--text);
            font-weight: 500;
        }

        .pager {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-btn {
            border: none;
            background: none;
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 6px;
            line-height: 1;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--line);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .step {
            color: var(--muted);
            font-size: 14px;
            min-width: 38px;
            text-align: center;
        }

        /* ── Chat body ───────────────────────────────── */
        .chat-body {
            padding: 20px 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #f9fafb;
        }

        /* ── User turn (right bubble) ────────────────── */
        .user-turn {
            align-self: flex-end;
            max-width: 75%;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 14px 14px 4px 14px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-question {
            margin: 0;
            font-size: 15px;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
        }

        .problem-image {
            width: 100%;
            max-width: 300px;
            align-self: flex-end;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--line);
            object-fit: cover;
        }

        /* ── Assistant turn (left) ───────────────────── */
        .assistant-turn {
            align-self: flex-start;
            max-width: 92%;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .assistant-avatar {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1976D2;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .assistant-body {
            flex: 1;
            min-width: 0;
        }

        .assistant-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .assistant-content {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 4px 14px 14px 14px;
            padding: 12px 14px;
        }

        .assistant-scroll {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: auto;
            max-height: 560px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            font-family: inherit;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <section class="chat-card" aria-label="Example conversation">
            <header class="chat-header">
                <div class="header-left">
                    <span class="demo-tag" id="demoLabel">Demo1</span>
                    <span class="header-sep"></span>
                    <span class="header-title"></span>
                </div>
                <div class="pager">
                    <button class="nav-btn" id="prevBtn">&#8249;</button>
                    <span class="step" id="stepLabel">1/3</span>
                    <button class="nav-btn" id="nextBtn">&#8250;</button>
                </div>
            </header>

            <div class="chat-body">
                <article class="user-turn" aria-label="User message">
                    <p class="user-question" id="questionText"></p>
                    <img class="problem-image" id="problemImage" src=""
                        alt="Grounding, Counting & Visual Search problem screenshot" />
                </article>

                <article class="assistant-turn" aria-label="Model response">
                    <div class="assistant-avatar" id="assistantAvatar">V</div>
                    <div class="assistant-body">
                        <div class="assistant-name" id="assistantName">Vero</div>
                        <div class="assistant-content">
                            <div class="assistant-scroll" id="assistantText"></div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script>
        const DEMOS = [{ "demo": "Grounding, Counting & Visual Search 1", "question": "A white SUV is driving on the road. There is a red sedan with a white roof at the top right and a blue bus at the top left. Where is the white SUV located? Output the bounding box(es) in JSON array format: [{\"bbox_2d\": [x_min, y_min, x_max, y_max], \"label\": \"<class name>\"}]", "image": "example_ground1.png", "assistant": "&lt;think&gt;\nGot it, let's look at the image. The question is asking for the location of a white SUV. First, I need to identify all vehicles mentioned: white SUV, red sedan with white roof (top right), blue bus (top left). But the main focus is the white SUV.\n\nLooking at the lower part of the image, near the bottom center on the highway. Let's check the roads. There's a multi-lane road with cars. Let me scan for a white SUV. \n\nFirst, check the highways. In the foreground (lower part), there's a white car. Wait, the problem says \"white SUV\". Let's find that. On the road below the pedestrian bridge: there's a white SUV. Let's check coordinates.\n\nThe white SUV—maybe the car on the middle lane. Let's see: in the lower section, on the highway. Let's locate:\n\n- Blue bus: top left? Maybe the bus on the left side, but the blue bus mentioned is \"at the top left\". Looking at the lower part near the bridge: there's a blue bus (bus) on the left. But the SUV is another vehicle.\n\nWait, the question states: \"a white SUV is driving on the road, there is a red sedan with a white roof driving at the top right and a blue bus at the top left. Where is the white SUV located?\"\n\nSo we need to find the white SUV. Let's look for white SUV. Let's check each vehicle:\n\n1. Blue bus: top left area. Let's see—near the bottom left of the image, under the glass buildings, there's a bus (blue) on the road. Bounding box for that bus: [426, 713, 451, 772].\n\n2. Red sedan with white roof: maybe a taxi (red with white roof) in the top right. For example, on the upper highway—there are red taxis with white roofs. But the SUV is separate.\n\n3. White SUV: looking for a white SUV. In the lower roads: on the highway below the pedestrian bridge. Let's check the lanes. The white SUV would be a larger white car.\n\nOn the highway (lower part), there's a white car. Let's check:\n\n- A white SUV: [450, 833, 469, 875] (this is a white car/suv in the lane).\n\n- Another white SUV? Let's see other white vehicles. Also, a white van or something else.\n\nBut the specific white SUV: let's confirm. The white SUV is likely [450, 833, 469, 875]. Let me check again.\n\nOther white vehicles: another car further ahead. But the most prominent white SUV is around that spot.\n\nAlso, check if there's another SUV. The problem states \"the white SUV\" so one instance.\n\nSo bounding box for white SUV: [450, 833, 469, 875].\n\nNow, confirm the coordinates. The image shows a multi-level highway. The SUV is on the roadway below the pedestrian bridge, in the leftmost lane (or middle lanes).\n\nYes, [450, 833, 469, 875] seems to be the white SUV.\n&lt;/think&gt;\n\n&lt;answer&gt;\nTo locate the white SUV, examine the image focusing on vehicles described. The blue bus is near the top-left (e.g., near the bridge lower left: `[426, 713, 451, 772]`), and the red sedan with a white roof appears among vehicles in the upper right. The white SUV must be identified separately. Scanning the lower highway sections (below the pedestrian bridge), a white SUV is visible in the middle lane:  \n\n- **White SUV**: `[450, 833, 469, 875]`  \n\nThis matches the description of a white SUV on the road, distinct from the bus and sedan specified.  \n\n\\boxed{[{\"bbox_2d\": [450, 833, 469, 875], \"label\": \"white SUV\"}]}\n&lt;/answer&gt;", "bboxImage": "example_ground1_bbox.png" }, { "demo": "Grounding, Counting & Visual Search 2", "question": "How many chairs are visible?", "image": "example_ground3.png", "assistant": "&lt;think&gt;\nOkay, let's see. The question is asking how many chairs are visible in the image. I need to count all the chairs present.\n\nStarting from the left side of the image: there's a chair with an orange frame and a blue cushion. Wait, that's one chair. Then another similar chair on the right side with an orange frame but a black and blue seat. Oh, but maybe there's also a chair in the bottom right corner with a blue cushion. Hmm, let me check again.\n\nWait, there's a small green table with two gray chairs sitting at it. So those two chairs near the table—count those as two more. So far, that's two chairs by the table plus the two chairs with orange frames. Wait, no—the first chair on the left (orange frame) is one chair, then the chair on the right side (orange frame) is another. Then the bottom right corner has another chair with a blue cushion and orange frame. Let me list them:\n\n1. Chair with orange frame, blue cushion, left side (near the plant stand).\n2. Two small gray chairs at the green table.\n3. Chair with orange frame, black/blue seat, right side.\n4. Chair with orange frame and blue cushion in the bottom right corner.\n\nWait, the two small gray chairs are separate chairs. So total chairs would be: 2 (small gray chairs at table) + 3 (the three orange frame chairs). Wait, but the leftmost chair with blue cushion is one, the chair with black/blue seat is another, the chair in bottom right is another. That's three chairs. Plus the two small gray chairs. So total five? But let me check again.\n\nThe image shows:\n\n- On the left: an orange wire chair with blue cushion (1)\n- Near the green table: two small white/green chairs (2+)\n- Right side: an orange wire chair with black/blue seat (3)\n- Bottom right corner: an orange wire chair with blue cushion (4)\n\nWait, so that's four chairs. But the small chairs at the table are two separate chairs. So total chairs: 2 (small chairs) + 3 (orange framed chairs) = 5. But let me count each distinct chair.\n\n1. Leftmost chair with blue cushion (orange frame) – yes.\n2. Small chair near table (gray) – front one.\n3. Another small chair behind it.\n4. Chair with black/blue seat (right side).\n5. Bottom right chair with blue cushion.\n\nYes, that's five chairs. Wait, but maybe the chair at the table are considered two chairs. So total chairs: 2 (at table) + 3 (other chairs) = 5.\n\nBut let me confirm:\n\n- Two small chairs (white seats, gray legs) at the green table: 2\n- Three larger chairs with orange frames:\n  - Left chair (blue cushion)\n  - Middle-right chair (black/blue seat)\n  - Bottom right chair (blue cushion)\n\nSo 2 + 3 = 5 chairs. So the answer should be 5.\n&lt;/think&gt;\n\n&lt;answer&gt;\nTo determine the number of visible chairs, we examine the image carefully:  \n\n- **Two small gray chairs** sit at the green table (foreground).  \n- **Three larger chairs with orange frames** are visible:  \n  - One chair with blue cushion on the far left.  \n  - One chair with black-and-blue cushion near the center-right.  \n  - One chair with blue cushion in the bottom-right corner.  \n\nCounting these distinct chairs (2 small + 3 larger) gives a total of 5 visible chairs.  \n\n\\boxed{5}\n&lt;/answer&gt;", "bboxImage": "" }, { "demo": "Grounding, Counting & Visual Search 3", "question": "What is the material of the glove?\nA. rubber\nB. cotton\nC. kevlar\nD. leather", "image": "example_ground2.png", "assistant": "&lt;think&gt;\nOkay, let's see. The question is asking for the material of the glove the person is wearing. The options are rubber, cotton, kevlar, or leather.\n\nLooking at the image: there's a person wearing blue gloves. Wait, gloves in the image—specifically, the person in the apron and mask has blue gloves on. I need to figure out what material they are made of. Common glove materials used in food handling, like at a street food stall, are often nitrile or latex (which are types of rubber), maybe vinyl, but sometimes cotton or other fabrics. However, medical gloves can be latex or nitrile. But here it's a market scene, maybe food service gloves. \n\nOption A is rubber. Since rubber gloves are common in food preparation to prevent contamination, that's a possibility. Option B is cotton—cotton gloves might be used sometimes but less common for hygiene purposes because cotton isn't waterproof. Kevlar (C) is a high-strength fiber, not typical for gloves in this context. Leather (D) is possible but less common for disposable gloves in food service unless it's a specific type. \n\nWait, the gloves look like disposable gloves. Blue gloves here—often in restaurants, especially in Asian street food markets, they might use nitrile or latex rubber gloves. So rubber (A) seems likely. Cotton gloves (B) are more for heavy-duty work, not typical for food handling where hygiene is key. So the answer should be A. rubber.\n&lt;/think&gt;\n\n&lt;answer&gt;\nThe image shows a street food vendor stall with skewered items (including squid and meat) displayed on trays. A person wearing a white apron, blue gloves, and a face mask is visible behind the counter, holding a phone. The gloves appear to be **disposable** and commonly used in food service for hygiene. Among the options:  \n- **Rubber** (A) is the most plausible material, as nitrile or latex rubber gloves are standard in food-handling environments (especially in markets or stalls).  \n- Cotton (B) is less likely for such practical, hygiene-focused use.  \n- Kevlar (C) and leather (D) are uncommon for disposable food gloves.  \n\n\\boxed{A}\n&lt;/answer&gt;", "bboxImage": "" }];
        let index = 0;

        const demoLabel = document.getElementById('demoLabel');
        const stepLabel = document.getElementById('stepLabel');
        const questionText = document.getElementById('questionText');
        const problemImage = document.getElementById('problemImage');
        const assistantText = document.getElementById('assistantText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function normalizeAssistant(raw) {
            const lines = String(raw).replace(/\r\n/g, '\n').split('\n');
            while (lines.length && lines[0].trim() === '') lines.shift();
            while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
            const isTagLine = l => /^\s*&lt;\/?(?:think|answer)&gt;\s*$/i.test(l);
            let minIndent = Infinity;
            for (const l of lines) {
                if (!l.trim() || isTagLine(l)) continue;
                const m = l.match(/^[ \t]*/);
                const n = m ? m[0].length : 0;
                if (n < minIndent) minIndent = n;
            }
            if (!Number.isFinite(minIndent)) minIndent = 0;
            return lines.map(l => {
                if (isTagLine(l)) return l.trim();
                if (!l.trim()) return '';
                return l.slice(Math.min(minIndent, (l.match(/^[ \t]*/) || [''])[0].length)).trimEnd();
            }).join('\n');
        }

        function render() {
            const item = DEMOS[index];
            demoLabel.textContent = item.demo;
            stepLabel.textContent = (index + 1) + '/' + DEMOS.length;
            questionText.textContent = item.question;
            problemImage.src = item.image || '';
            problemImage.style.display = item.image ? 'block' : 'none';
            assistantText.innerHTML = normalizeAssistant(item.assistant)
                .replace(/\*\*(.*?)\*\*/gs, '<strong>$1</strong>')
                .replace(/(?<!\w)\*(?!\s)(.*?)(?<!\s)\*(?!\w)/gs, '<em>$1</em>');
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === DEMOS.length - 1;
        }

        prevBtn.addEventListener('click', () => { if (index > 0) { index--; render(); } });
        nextBtn.addEventListener('click', () => { if (index < DEMOS.length - 1) { index++; render(); } });
        render();
    </script>
</body>

</html>
